<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王曼琦小测试</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#ffe6f0;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
font-size:32px;
margin-bottom:40px;
padding:0 20px;
}

button{
padding:15px 40px;
font-size:22px;
margin:20px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#ff4d88;
color:white;
}

#no{
background:#777;
color:white;
}

#face{
font-size:70px;
margin-top:20px;
display:none;
}

#message{
font-size:30px;
margin-top:20px;
color:#ff2b6b;
font-weight:bold;
}

.icon{
position:absolute;
font-size:30px;
pointer-events:none;
}

.heartBeat{
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.sparkle{
position:absolute;
font-size:14px;
opacity:0.8;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

</style>
</head>

<body>

<h1 id="question"></h1>

<div id="buttons">
<button id="yes"></button>
<button id="no"></button>
</div>

<div id="face"></div>
<div id="message"></div>

<script>

const questions=[
"王曼琦是不是世界上最可爱的女人？",
"王曼琦是不是世界上最美丽的女人？",
"王曼琦是不是罗力文最爱的宝宝？",
"罗力文是不是王曼琦老公？",
"你羡慕王曼琦吗？"
]

const yesText=["是","是","是","是","羡慕"]
const noText=["不是","不是","不是","不是","不羡慕"]

let step=0
let yesSize=1
let noSize=1

const question=document.getElementById("question")
const yes=document.getElementById("yes")
const no=document.getElementById("no")
const face=document.getElementById("face")
const message=document.getElementById("message")

function loadQuestion(){

question.innerText=questions[step]
yes.innerText=yesText[step]
no.innerText=noText[step]

yesSize=1
noSize=1

yes.style.transform="scale(1)"
no.style.transform="scale(1)"

face.style.display="none"
message.innerText=""

}

loadQuestion()


/* 随机闪现图案 */

function randomIcons(icon,count=80){

for(let i=0;i<count;i++){

let e=document.createElement("div")
e.className="icon"
e.innerText=icon

e.style.left=Math.random()*100+"vw"
e.style.top=Math.random()*100+"vh"

document.body.appendChild(e)

setTimeout(()=>{e.remove()},1000)

}

}


/* 大爱心 */

function bigHeart(){

const width=window.innerWidth
const height=window.innerHeight

const centerX=width/2
const centerY=height/2

let t=0

let timer=setInterval(()=>{

let x=16*Math.pow(Math.sin(t),3)
let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))

let e=document.createElement("div")
e.className="icon heartBeat"
e.innerText="❤️"

e.style.left=centerX + x*20 + "px"
e.style.top=centerY + y*20 + "px"

document.body.appendChild(e)

t+=0.05

if(t>Math.PI*2){

clearInterval(timer)

setTimeout(()=>{
sparkleBackground()
},500)

}

},10)

}


/* 背景闪光 */

function sparkleBackground(){

for(let i=0;i<80;i++){

let s=document.createElement("div")

s.className="sparkle"
s.innerText="✨"

s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"

document.body.appendChild(s)

}

}


/* 点击 是 */

yes.onclick=function(){

if(step<4){

randomIcons("👍",60)
randomIcons("❤️",40)

step++

setTimeout(loadQuestion,1000)

}else{

document.getElementById("buttons").style.display="none"

/* 替换问题文字 */
question.innerText="罗力文 ❤️ 王曼琦"
question.style.fontSize="42px"

message.innerText=""

bigHeart()

}

}


/* 点击 不是 */

no.onclick=function(){

yesSize*=1.4
noSize*=0.6

yes.style.transform="scale("+yesSize+")"
no.style.transform="scale("+noSize+")"

if(step<=1){

face.innerText="😠"
face.style.display="block"

}

if(step==2||step==3){

face.innerText="😈"
face.style.display="block"

randomIcons("👋",80)

}

if(step==4){

randomIcons("🙄",80)
message.innerText="你觉得我信吗"

}

}

</script>

</body>
</html>
